<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Mark's Atom Feed</title>
    <style>
      :root { color-scheme: light dark; }
      body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #f8fafc; color: #0f172a; }
      .container { max-width: 860px; margin: 0 auto; padding: 32px 16px 48px; }
      .header { background: #fff; border-radius: 16px; box-shadow: 0 10px 25px rgba(2, 6, 23, 0.08); padding: 24px; margin-bottom: 20px; }
      .header h1 { margin: 0 0 8px; font-size: 28px; }
      .header p { margin: 0; color: #475569; line-height: 1.6; }
      .actions { margin-top: 14px; display: flex; gap: 10px; flex-wrap: wrap; }
      .btn { display: inline-flex; align-items: center; gap: 8px; text-decoration: none; border-radius: 999px; padding: 8px 14px; font-weight: 600; font-size: 14px; }
      .btn-primary { background: #0f172a; color: #fff; }
      .btn-secondary { background: #e2e8f0; color: #0f172a; }
      .list { display: grid; gap: 14px; }
      .card { background: #fff; border-radius: 16px; box-shadow: 0 6px 18px rgba(2, 6, 23, 0.08); overflow: hidden; }
      .cover { width: 100%; height: 220px; object-fit: cover; display: block; background: #e2e8f0; }
      .body { padding: 16px; }
      .body h2 { margin: 0 0 8px; font-size: 20px; }
      .body p { margin: 0 0 12px; color: #334155; line-height: 1.7; }
      .meta { display: flex; justify-content: space-between; align-items: center; gap: 12px; color: #64748b; font-size: 13px; }
      .meta a { color: #0f172a; text-decoration: none; font-weight: 600; }
      @media (prefers-color-scheme: dark) {
        body { background: #020617; color: #e2e8f0; }
        .header, .card { background: #0f172a; box-shadow: none; border: 1px solid #1e293b; }
        .header p, .body p { color: #cbd5e1; }
        .btn-primary { background: #e2e8f0; color: #0f172a; }
        .btn-secondary { background: #1e293b; color: #e2e8f0; }
        .meta, .meta a { color: #cbd5e1; }
      }
    </style>
  </head>
  <body>
    <main class="container">
      <section class="header">
        <h1>Mark's Atom Feed</h1>
        <p>This page is a stable browser view for the feed. Feed readers should subscribe to the XML endpoint.</p>
        <div class="actions">
          <a class="btn btn-primary" href="/feeds/atom.xml" target="_blank" rel="noopener noreferrer">Open Atom XML</a>
          <a class="btn btn-secondary" href="/">Back Home</a>
        </div>
      </section>
      <section class="list">
        <article class="card">
          <img class="cover" src="https://img.markxu.icu/imgRedNoteGuide.jpg" alt="广州游记" loading="lazy" />
          <div class="body">
            <h2>广州游记</h2>
            <p>这是我在广州的游记。</p>
            <div class="meta">
              <time datetime="2024-03-22T00:00:00.000Z">2024-03-22</time>
              <a href="https://markxu.icu/blog/%E5%B9%BF%E5%B7%9E%E6%B8%B8%E8%AE%B0" target="_blank" rel="noopener noreferrer">Read full article</a>
            </div>
          </div>
        </article>
      

        <article class="card">
          <img class="cover" src="https://img.markxu.icu/imgIMG_20230922_173547.jpg" alt="潮汕游记" loading="lazy" />
          <div class="body">
            <h2>潮汕游记</h2>
            <p>这是我在潮汕的游记。</p>
            <div class="meta">
              <time datetime="2023-09-27T00:00:00.000Z">2023-09-27</time>
              <a href="https://markxu.icu/blog/%E6%BD%AE%E6%B1%95%E6%B8%B8%E8%AE%B0" target="_blank" rel="noopener noreferrer">Read full article</a>
            </div>
          </div>
        </article>
      </section>
    </main>
  </body>
</html>
